<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Auto Content FaceBook- By Trường Saker</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f8fa; color: #1e2330;
      min-height: 100vh; display: flex; justify-content: center; padding: 20px;
    }
    .wrap {
      width: 100%; max-width: 920px;
      display: grid; grid-template-columns: 1fr 320px; gap: 16px;
      align-items: start; padding: 20px 0;
    }
    .main-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .side-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .card { background: #ffffff; border: 1px solid #e3e6ec; border-radius: 16px; padding: 20px 24px; box-shadow: 0 1px 2px rgba(20,24,40,0.04); }

    @media (max-width: 760px) {
      .wrap { grid-template-columns: 1fr; max-width: 560px; }
    }

    /* ===== LOGIN SCREEN ===== */
    #loginScreen {
      position: fixed; inset: 0; background: #f7f8fa;
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    #loginScreen.hidden { display: none; }
    .login-box {
      background: #ffffff; border: 1px solid #e3e6ec; border-radius: 20px;
      padding: 36px 32px; width: 90%; max-width: 380px; text-align: center;
      box-shadow: 0 4px 24px rgba(20,24,40,0.06);
    }
    .login-logo { font-size: 40px; margin-bottom: 12px; }
    .login-title { font-size: 17px; font-weight: 700; color: #4f46e5; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .login-sub { font-size: 12px; color: #8a93a3; margin-bottom: 28px; }
    .login-label { font-size: 11px; font-weight: 600; color: #5b6373; text-transform: uppercase; letter-spacing: 0.5px; display: block; text-align: left; margin-bottom: 8px; }
    .login-input {
      width: 100%; background: #f7f8fa; border: 1px solid #d8dce4;
      border-radius: 10px; padding: 12px 14px; font-size: 14px;
      font-family: inherit; color: #1e2330; letter-spacing: 2px;
      text-align: center; margin-bottom: 14px;
    }
    .login-input:focus { outline: none; border-color: #4f46e5; }
    .login-input::placeholder { letter-spacing: 0; color: #9aa1b0; }
    .btn-unlock {
      width: 100%; background: #4f46e5; color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-bottom: 10px;
    }
    .btn-unlock:hover { background: #4338ca; }
    .btn-unlock:disabled { background: #e3e6ec; color: #9aa1b0; cursor: not-allowed; }
    .login-error { font-size: 12px; color: #dc2626; min-height: 18px; margin-top: 4px; }
    .login-footer { font-size: 11px; color: #b0b6c2; margin-top: 20px; }

    /* KEY INFO BAR */
    .key-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #f0fdf6; border: 1px solid #c8f0d9;
      border-radius: 10px; padding: 8px 14px; margin-bottom: 16px; font-size: 12px;
    }
    .key-info { color: #15803d; display: flex; align-items: center; gap: 6px; }
    .btn-logout-key {
      background: #fff5f5; color: #dc2626; border: 1px solid #f3d2d2;
      border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .btn-logout-key:hover { background: #fde8e8; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid #ebedf1; margin-bottom: 16px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #4f46e5; text-transform: uppercase; letter-spacing: 0.5px; }

    /* AUTH BAR */
    .auth-bar { display: flex; align-items: center; justify-content: space-between; background: #f7f8fa; border: 1px solid #e3e6ec; border-radius: 10px; padding: 9px 14px; margin-bottom: 16px; font-size: 13px; }
    .auth-status { color: #5b6373; }
    .auth-status.ok { color: #15803d; }
    .btn-login { background: #4f46e5; color: #fff; border: none; border-radius: 7px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-login:hover { background: #4338ca; }
    .btn-login.hidden { display: none; }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    label { font-size: 11px; font-weight: 600; color: #5b6373; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-sm { background: #f0eefd; color: #4f46e5; border: 1px solid #ddd9fb; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-sm:hover { background: #e4e0fb; }
    textarea, input[type="text"] {
      width: 100%; background: #ffffff; border: 1px solid #d8dce4; border-radius: 10px;
      padding: 9px 12px; font-size: 13px; font-family: inherit; color: #1e2330;
      line-height: 1.5; transition: border-color 0.2s; resize: none;
    }
    textarea:focus, input[type="text"]:focus { outline: none; border-color: #4f46e5; }
    textarea::placeholder, input::placeholder { color: #9aa1b0; }
    textarea { height: 76px; }
    #productLinkInput { height: 56px; }

    .btn-group { display: flex; gap: 10px; margin-top: 6px; }
    #generateBtn { flex: 2; background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; }
    #generateBtn:hover:not(:disabled) { background: #4338ca; }
    #generateBtn:disabled { background: #e3e6ec; color: #9aa1b0; cursor: not-allowed; }
    #clearBtn { flex: 1; background: #f7f8fa; color: #5b6373; border: 1px solid #d8dce4; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #clearBtn:hover { background: #ebedf1; color: #1e2330; }

    .output-box { margin-top: 14px; background: #f7f8fa; border: 1px solid #e3e6ec; border-radius: 12px; overflow: hidden; }
    .output-header { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-bottom: 1px solid #e3e6ec; font-size: 12px; font-weight: 600; color: #4f46e5; }
    #copyBtn { background: #f0eefd; color: #4f46e5; border: 1px solid #ddd9fb; border-radius: 6px; padding: 3px 12px; font-size: 11px; font-weight: 600; cursor: pointer; }
    #copyBtn:hover { background: #e4e0fb; }
    #output { padding: 14px; font-size: 13px; color: #1e2330; line-height: 1.6; white-space: pre-wrap; word-break: break-word; min-height: 56px; }
    #output.placeholder { color: #9aa1b0; }
    #output.error { color: #dc2626; }
    #output.loading { color: #4f46e5; }

    /* TEMPLATES */
    .templates-card .card-title { font-size: 12px; font-weight: 700; color: #5b6373; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .btn-add-tpl { background: #4f46e5; color: #fff; border: none; border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-add-tpl:hover { background: #4338ca; }
    .tpl-list { display: flex; flex-direction: column; gap: 8px; }
    .tpl-item { display: flex; align-items: center; gap: 8px; background: #f7f8fa; border: 1px solid #e3e6ec; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color 0.2s; }
    .tpl-item:hover { border-color: #4f46e5; }
    .tpl-item.active { border-color: #4f46e5; background: #f0eefd; }
    .tpl-icon { font-size: 18px; flex-shrink: 0; }
    .tpl-info { flex: 1; min-width: 0; }
    .tpl-name { font-size: 13px; font-weight: 600; color: #1e2330; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tpl-link { font-size: 11px; color: #9aa1b0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .tpl-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-tpl-edit, .btn-tpl-del { background: #ffffff; border: 1px solid #e3e6ec; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
    .btn-tpl-edit { color: #4f46e5; }
    .btn-tpl-edit:hover { background: #f0eefd; }
    .btn-tpl-del { color: #dc2626; }
    .btn-tpl-del:hover { background: #fde8e8; }
    .tpl-empty { font-size: 13px; color: #9aa1b0; text-align: center; padding: 16px 0; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,24,40,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #ffffff; border: 1px solid #e3e6ec; border-radius: 16px; padding: 24px; width: 90%; max-width: 440px; box-shadow: 0 8px 32px rgba(20,24,40,0.12); }
    .modal h2 { font-size: 15px; font-weight: 700; color: #4f46e5; margin-bottom: 18px; }
    .modal .form-group { margin-bottom: 14px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; color: #5b6373; text-transform: uppercase; margin-bottom: 6px; }
    .modal input, .modal textarea { width: 100%; }
    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .btn-save { flex: 2; background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-save:hover { background: #4338ca; }
    .btn-cancel { flex: 1; background: #f7f8fa; color: #5b6373; border: 1px solid #d8dce4; border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-cancel:hover { background: #ebedf1; }
  </style>
</head>
<body>

<!-- ===== MÀN HÌNH NHẬP KEY ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🤖</div>
    <div class="login-title">AI Content FaceBook</div>
    <div class="login-sub">Nhập key để truy cập hệ thống</div>
    <label class="login-label" for="keyInput">🔑 Key bản quyền</label>
    <input type="text" class="login-input" id="keyInput" placeholder="Nhập key của bạn...">
    <div class="login-error" id="loginError"></div>
    <button class="btn-unlock" id="btnUnlock">🔓 Mở khoá</button>
    <div class="login-footer">Liên hệ admin trần quý trường để nhận key sử dụng</div>
  </div>
</div>

<!-- ===== NỘI DUNG CHÍNH ===== -->
<div class="wrap" id="mainContent" style="display:none">

  <div class="main-col">
    <div class="card">
      <div class="header">
        <span style="font-size:22px">🤖</span>
        <h1>AI Auto Content FaceBook- By Trường Saker</h1>
      </div>

      <!-- Key info -->
      <div class="key-bar">
        <div class="key-info">🔑 <span id="keyDisplay"></span></div>
        <button class="btn-logout-key" id="btnLogoutKey">Đăng xuất</button>
      </div>

      <!-- Puter Auth -->
      <div class="auth-bar">
        <span class="auth-status" id="authStatus">⏳ Đang kiểm tra...</span>
        <button class="btn-login hidden" id="loginBtn">Đăng nhập Puter</button>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Nội dung bài viết gốc</label>
          <button class="btn-sm" id="pasteBtn">📋 Dán nội dung</button>
        </div>
        <textarea id="articleInput" placeholder="Dán nội dung bài viết cần trả lời vào đây..."></textarea>
      </div>

      <div class="form-group">
        <label>Tên sản phẩm</label>
        <input type="text" id="productNameInput" placeholder="VD: Sữa rửa mặt trị mụn, Áo thun nam...">
      </div>

      <div class="form-group">
        <label>Danh sách link Shopee (mỗi link một dòng)</label>
        <textarea id="productLinkInput" placeholder="Dán các link Shopee vào đây..."></textarea>
      </div>

      <div class="btn-group">
        <button id="generateBtn">✨ Tạo bình luận</button>
        <button id="clearBtn">🔄 Làm mới</button>
      </div>

      <div class="output-box">
        <div class="output-header">
          <span>✨ Kết quả bình luận</span>
          <button id="copyBtn">Sao chép</button>
        </div>
        <div id="output" class="placeholder">Bình luận sẽ xuất hiện tại đây...</div>
      </div>
    </div>
  </div>

  <!-- TEMPLATES -->
  <div class="side-col">
    <div class="card templates-card">
      <div class="card-title">
        <span>📦 Mẫu sản phẩm sẵn</span>
        <button class="btn-add-tpl" id="btnAddTpl">+ Thêm mẫu</button>
      </div>
      <div class="tpl-list" id="tplList"></div>
    </div>
  </div>

</div>

<!-- MODAL MẪU -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Thêm mẫu mới</h2>
    <div class="form-group">
      <label>Tên mẫu</label>
      <input type="text" id="tplNameInput" placeholder="VD: Mẫu 1 - Kem dưỡng da...">
    </div>
    <div class="form-group">
      <label>Tên sản phẩm</label>
      <input type="text" id="tplProductInput" placeholder="VD: Kem dưỡng ẩm Cerave...">
    </div>
    <div class="form-group">
      <label>Danh sách link Shopee (mỗi link một dòng)</label>
      <textarea id="tplLinksInput" style="height:70px" placeholder="Dán link Shopee vào đây..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-save" id="btnSaveTpl">💾 Lưu mẫu</button>
      <button class="btn-cancel" id="btnCancelTpl">Huỷ</button>
    </div>
  </div>
</div>

<script>
  // ==============================
  // KEY AUTH - fetch từ keys.json trên GitHub Pages
  // ==============================
  // URL của file keys.json (cùng repo GitHub Pages)
  const KEYS_URL = './keys.json';
  const KEY_STORAGE = 'ai_commenter_key';

  const loginScreen = document.getElementById('loginScreen');
  const mainContent = document.getElementById('mainContent');
  const keyInput = document.getElementById('keyInput');
  const btnUnlock = document.getElementById('btnUnlock');
  const loginError = document.getElementById('loginError');
  const keyDisplay = document.getElementById('keyDisplay');
  const btnLogoutKey = document.getElementById('btnLogoutKey');

  async function fetchValidKeys() {
    try {
      const res = await fetch(KEYS_URL + '?t=' + Date.now());
      const data = await res.json();
      return data.keys || [];
    } catch {
      return null; // lỗi mạng
    }
  }

  async function checkKey(key) {
    const keys = await fetchValidKeys();
    if (keys === null) return 'network';
    return keys.map(k => k.trim().toUpperCase()).includes(key.trim().toUpperCase());
  }

  function showMain(key) {
    loginScreen.classList.add('hidden');
    mainContent.style.display = 'flex';
    // Hiển thị key rút gọn: KEY-****-****-ABCD
    const parts = key.split('-');
    const masked = parts.map((p, i) => (i === 0 || i === parts.length - 1) ? p : '****').join('-');
    keyDisplay.textContent = masked;
    updateAuthUI();
    loadTemplates();
    renderTemplates();
  }

  // Kiểm tra key đã lưu khi load
  window.addEventListener('load', async () => {
    const saved = localStorage.getItem(KEY_STORAGE);
    if (saved) {
      const valid = await checkKey(saved);
      if (valid === true) { showMain(saved); return; }
      // key bị thu hồi hoặc lỗi → xoá và hiện màn đăng nhập
      localStorage.removeItem(KEY_STORAGE);
    }
  });

  btnUnlock.addEventListener('click', async () => {
    const key = keyInput.value.trim();
    if (!key) { loginError.textContent = 'Vui lòng nhập key!'; return; }
    btnUnlock.disabled = true;
    btnUnlock.textContent = '⏳ Đang kiểm tra...';
    loginError.textContent = '';

    const result = await checkKey(key);
    if (result === true) {
      localStorage.setItem(KEY_STORAGE, key);
      showMain(key);
    } else if (result === 'network') {
      loginError.textContent = '❌ Không kết nối được. Vui lòng thử lại.';
    } else {
      loginError.textContent = '❌ Key không hợp lệ hoặc đã hết hạn!';
    }
    btnUnlock.disabled = false;
    btnUnlock.textContent = '🔓 Mở khoá';
  });

  keyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') btnUnlock.click(); });

  btnLogoutKey.addEventListener('click', () => {
    if (!confirm('Đăng xuất khỏi web?')) return;
    localStorage.removeItem(KEY_STORAGE);
    mainContent.style.display = 'none';
    loginScreen.classList.remove('hidden');
    keyInput.value = '';
    loginError.textContent = '';
  });

  // ==============================
  // PUTER AUTH
  // ==============================
  const authStatus = document.getElementById('authStatus');
  const loginBtn = document.getElementById('loginBtn');

  function updateAuthUI() {
    if (typeof puter === 'undefined' || !puter.auth.isSignedIn()) {
      authStatus.textContent = '⚠️ Chưa đăng nhập Puter';
      authStatus.className = 'auth-status';
      loginBtn.classList.remove('hidden');
    } else {
      authStatus.textContent = '✅ Đã đăng nhập Puter';
      authStatus.className = 'auth-status ok';
      loginBtn.classList.add('hidden');
    }
  }

  loginBtn.addEventListener('click', async () => {
    try { await puter.auth.signIn(); updateAuthUI(); }
    catch(e) { authStatus.textContent = '❌ ' + e.message; }
  });

  // ==============================
  // TEMPLATES
  // ==============================
  const STORAGE_KEY = 'ai_commenter_templates';
  let templates = [];
  let editingIndex = -1;

  const tplList = document.getElementById('tplList');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const tplNameInput = document.getElementById('tplNameInput');
  const tplProductInput = document.getElementById('tplProductInput');
  const tplLinksInput = document.getElementById('tplLinksInput');
  const btnSaveTpl = document.getElementById('btnSaveTpl');
  const btnCancelTpl = document.getElementById('btnCancelTpl');

  function loadTemplates() {
    try { templates = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { templates = []; }
  }

  function saveTemplates() { localStorage.setItem(STORAGE_KEY, JSON.stringify(templates)); }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderTemplates() {
    if (!templates.length) {
      tplList.innerHTML = '<div class="tpl-empty">Chưa có mẫu nào. Nhấn "+ Thêm mẫu" để tạo.</div>';
      return;
    }
    tplList.innerHTML = templates.map((t, i) => `
      <div class="tpl-item" id="tpl-${i}" onclick="applyTemplate(${i})">
        <div class="tpl-icon">📦</div>
        <div class="tpl-info">
          <div class="tpl-name">${esc(t.name)}</div>
          <div class="tpl-link">${esc(t.product)}</div>
        </div>
        <div class="tpl-actions" onclick="event.stopPropagation()">
          <button class="btn-tpl-edit" onclick="openEditModal(${i})">✏️ Sửa</button>
          <button class="btn-tpl-del" onclick="deleteTemplate(${i})">🗑️</button>
        </div>
      </div>`).join('');
  }

  function applyTemplate(i) {
    const t = templates[i];
    document.getElementById('productNameInput').value = t.product;
    document.getElementById('productLinkInput').value = t.links;
    document.querySelectorAll('.tpl-item').forEach(el => el.classList.remove('active'));
    document.getElementById('tpl-' + i)?.classList.add('active');
    document.getElementById('productNameInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function deleteTemplate(i) {
    if (!confirm(`Xoá mẫu "${templates[i].name}"?`)) return;
    templates.splice(i, 1); saveTemplates(); renderTemplates();
  }

  function openEditModal(i) {
    editingIndex = i;
    const t = templates[i];
    modalTitle.textContent = 'Sửa mẫu';
    tplNameInput.value = t.name; tplProductInput.value = t.product; tplLinksInput.value = t.links;
    modalOverlay.classList.add('show'); tplNameInput.focus();
  }

  document.getElementById('btnAddTpl').addEventListener('click', () => {
    editingIndex = -1;
    modalTitle.textContent = 'Thêm mẫu mới';
    tplNameInput.value = ''; tplProductInput.value = ''; tplLinksInput.value = '';
    modalOverlay.classList.add('show'); tplNameInput.focus();
  });

  btnCancelTpl.addEventListener('click', () => modalOverlay.classList.remove('show'));
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('show'); });

  btnSaveTpl.addEventListener('click', () => {
    const name = tplNameInput.value.trim();
    const product = tplProductInput.value.trim();
    const links = tplLinksInput.value.trim();
    if (!name) { alert('Vui lòng nhập tên mẫu!'); return; }
    if (!product) { alert('Vui lòng nhập tên sản phẩm!'); return; }
    const tpl = { name, product, links };
    if (editingIndex >= 0) templates[editingIndex] = tpl; else templates.push(tpl);
    saveTemplates(); renderTemplates(); modalOverlay.classList.remove('show');
  });

  // ==============================
  // MAIN ACTIONS
  // ==============================
  const articleInput = document.getElementById('articleInput');
  const productNameInput = document.getElementById('productNameInput');
  const productLinkInput = document.getElementById('productLinkInput');
  const generateBtn = document.getElementById('generateBtn');
  const output = document.getElementById('output');

  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try { articleInput.value = await navigator.clipboard.readText(); }
    catch { alert('Trình duyệt chặn clipboard. Hãy dán thủ công bằng Ctrl+V.'); }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    articleInput.value = ''; productNameInput.value = ''; productLinkInput.value = '';
    output.textContent = 'Bình luận sẽ xuất hiện tại đây...'; output.className = 'placeholder';
    document.querySelectorAll('.tpl-item').forEach(el => el.classList.remove('active'));
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    const copyBtn = document.getElementById('copyBtn');
    if (!output.classList.contains('placeholder') && !output.classList.contains('loading')) {
      navigator.clipboard.writeText(output.textContent);
      const orig = copyBtn.textContent;
      copyBtn.textContent = '✔️ Đã chép!';
      setTimeout(() => copyBtn.textContent = orig, 2000);
    }
  });

  generateBtn.addEventListener('click', async () => {
    const article = articleInput.value.trim();
    const productName = productNameInput.value.trim();
    const productLinks = productLinkInput.value.trim();
    if (!article) { alert('Vui lòng dán nội dung bài viết gốc!'); return; }

    if (!puter.auth.isSignedIn()) {
      try { await puter.auth.signIn(); updateAuthUI(); }
      catch(e) { output.textContent = '❌ Chưa đăng nhập Puter.'; output.className = 'error'; return; }
    }

    let selectedLink = '';
    if (productLinks) {
      const arr = productLinks.split('\n').map(l => l.trim()).filter(l => l);
      if (arr.length) selectedLink = arr[Math.floor(Math.random() * arr.length)];
    }

    generateBtn.disabled = true; generateBtn.textContent = '⏳ Đang xử lý...';
    output.textContent = 'Đang phân tích và tạo bình luận...'; output.className = 'loading';

    const prompt = `Bạn là chuyên gia Social Content và Affiliate Marketing.
Nhiệm vụ: Viết 1 bình luận mạng xã hội gồm 2 phần liên kết mượt mà thành đoạn văn hoàn chỉnh.
Thông tin:
- Nội dung bài viết: "${article}"
- Tên sản phẩm: "${productName || 'Sản phẩm'}"
- Link sản phẩm: "${selectedLink || ''}"
Quy tắc:
BƯỚC 1: Viết 1-2 câu tương tác, đồng cảm. Giọng đời thường, tự nhiên.
BƯỚC 2: Nếu sản phẩm liên quan → lồng ghép tự nhiên. Nếu không → "À tiện thể", "Sẵn tiện"... rồi giới thiệu kèm link.
Định dạng: 2-4 câu ngắn, icon nhẹ, URL trực tiếp, không ngoặc kép, không dấu chấm cuối.
Trả về DUY NHẤT nội dung bình luận.`;

    try {
      const response = await puter.ai.chat(prompt, { model: 'gpt-4o' });
      let result = response?.message?.content || (typeof response === 'string' ? response : 'Không có phản hồi.');
      output.textContent = result.replace(/^"|"$/g, '').trim();
      output.className = '';
    } catch(e) {
      output.textContent = '❌ Lỗi: ' + (e.message || 'Không xác định');
      output.className = 'error';
    } finally {
      generateBtn.disabled = false; generateBtn.textContent = '✨ Tạo bình luận';
    }
  });
</script>
</body>
</html>
