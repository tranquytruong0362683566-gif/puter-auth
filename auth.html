<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puter Auth</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; flex-direction: column; gap: 16px; }
    .msg { font-size: 18px; color: #1e293b; font-weight: 600; }
    .sub { font-size: 13px; color: #64748b; max-width: 400px; text-align: center; line-height: 1.6; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Đang tải Puter...</div>
  <div class="sub" id="sub">Vui lòng chờ trong giây lát.</div>

  <script>
    // Thử load puter.js theo thứ tự ưu tiên
    const PUTER_URLS = [
      "https://js.puter.com/v2/",
      "https://cdn.jsdelivr.net/npm/@puterjs/sdk/dist/puter.dev.js",
      "https://unpkg.com/@puterjs/sdk/dist/puter.dev.js"
    ];

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function tryLoadPuter() {
      for (const url of PUTER_URLS) {
        try {
          document.getElementById('sub').innerText = 'Đang tải từ: ' + url;
          await loadScript(url);
          if (typeof puter !== 'undefined') {
            console.log('Loaded puter from:', url);
            return true;
          }
        } catch (e) {
          console.warn('Failed to load from:', url);
        }
      }
      return false;
    }

    (async () => {
      const loaded = await tryLoadPuter();

      if (!loaded || typeof puter === 'undefined') {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').innerText = '❌ Không tải được thư viện Puter';
        document.getElementById('sub').innerText = 'Vui lòng kiểm tra kết nối mạng và thử lại.';
        return;
      }

      try {
        document.getElementById('msg').innerText = 'Đang mở đăng nhập...';
        document.getElementById('sub').innerText = 'Vui lòng hoàn tất đăng nhập trong cửa sổ hiện ra.';

        if (!puter.auth.isSignedIn()) {
          await puter.auth.signIn();
        }

        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').innerText = '✅ Đăng nhập thành công!';
        document.getElementById('sub').innerText = 'Quay lại extension và nhấn "Tạo bình luận" lần nữa.';
      } catch (e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').innerText = '❌ Đăng nhập thất bại';
        document.getElementById('sub').innerText = e.message || 'Vui lòng đóng tab này và thử lại.';
      }
    })();
  </script>
</body>
</html>
