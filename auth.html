<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puter Auth</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; flex-direction: column; gap: 16px; }
    .msg { font-size: 18px; color: #1e293b; font-weight: 600; }
    .sub { font-size: 13px; color: #64748b; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Đang mở đăng nhập Puter...</div>
  <div class="sub" id="sub">Vui lòng hoàn tất đăng nhập trong cửa sổ hiện ra.</div>

  <!-- Load Puter từ CDN, không dùng file local -->
  <script src="https://js.puter.com/v2/"></script>
  <script>
    (async () => {
      try {
        if (!puter.auth.isSignedIn()) {
          await puter.auth.signIn();
        }
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').innerText = '✅ Đăng nhập thành công!';
        document.getElementById('sub').innerText = 'Quay lại extension và nhấn "Tạo bình luận" lần nữa.';
      } catch (e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').innerText = '❌ Đăng nhập thất bại';
        document.getElementById('sub').innerText = e.message || 'Vui lòng đóng tab này và thử lại.';
      }
    })();
  </script>
</body>
</html>
