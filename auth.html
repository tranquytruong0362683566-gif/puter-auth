<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Đăng nhập Puter</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; flex-direction: column; gap: 16px; }
    .msg { font-size: 16px; color: #1e293b; }
    .sub { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div class="msg">⏳ Đang xử lý đăng nhập Puter...</div>
  <div class="sub">Cửa sổ này sẽ tự đóng sau khi đăng nhập thành công.</div>
  <script src="puter.js"></script>
  <script>
    (async () => {
      try {
        if (!puter.auth.isSignedIn()) {
          await puter.auth.signIn();
        }
        // Lưu trạng thái đăng nhập thành công
        await chrome.storage.local.set({ puterAuthDone: true });
        document.querySelector('.msg').innerText = '✅ Đăng nhập thành công! Đang đóng...';
        document.querySelector('.sub').innerText = 'Quay lại extension và nhấn "Tạo bình luận" lần nữa.';
        setTimeout(() => window.close(), 1500);
      } catch (e) {
        document.querySelector('.msg').innerText = '❌ Đăng nhập thất bại.';
        document.querySelector('.sub').innerText = e.message || 'Vui lòng thử lại.';
      }
    })();
  </script>
</body>
</html>
